<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 AI Trading Dashboard - Option Hedge Strategy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .symbol-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }

        .symbol-btn {
            background: #f0f0f0;
            color: #333;
        }

        .symbol-btn.active {
            background: #667eea;
            color: white;
        }

        .symbol-btn:hover {
            background: #667eea;
            color: white;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .loading {
            display: none;
            text-align: center;
            color: white;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
            font-weight: 500;
        }

        .metric-value {
            color: #333;
            font-weight: 600;
            font-size: 1.1em;
        }

        .signal-buy {
            color: #48bb78;
            font-weight: bold;
        }

        .signal-sell {
            color: #f56565;
            font-weight: bold;
        }

        .signal-hold {
            color: #ed8936;
            font-weight: bold;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }

        .success {
            background: #c6f6d5;
            color: #22543d;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }

        .trades-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .trades-table th {
            background: #f0f0f0;
            padding: 10px;
            text-align: left;
            font-weight: 600;
        }

        .trades-table td {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .trade-buy {
            color: #48bb78;
        }

        .trade-sell {
            color: #f56565;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📈 AI Trading Dashboard</h1>
            <p class="subtitle">ML Predictions + RL Trading Signals</p>
        </header>

        <div class="controls">
            <div class="symbol-selector">
                <button class="symbol-btn active" data-symbol="NIFTY">NIFTY</button>
                <button class="symbol-btn" data-symbol="BANKNIFTY">BANKNIFTY</button>
                <button class="symbol-btn" data-symbol="FINNIFTY">FINNIFTY</button>
                <button class="symbol-btn" data-symbol="MIDCPNIFTY">MIDCPNIFTY</button>
                <button class="symbol-btn" data-symbol="SENSEX">SENSEX</button>
            </div>

            <div class="action-buttons">
                <button class="btn-primary" id="predictBtn">🤖 Get Prediction</button>
                <button class="btn-secondary" id="signalBtn">🎯 Get Trade Signal</button>
                <button class="btn-danger" id="backtestBtn">📊 Run Backtest</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing... Please wait</p>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <div class="results-grid" id="results"></div>

        <footer>
            <p>🚀 Powered by ML Predictions + Reinforcement Learning | Real-time Option Hedging Strategy</p>
        </footer>
    </div>

    <script>
        let currentSymbol = 'NIFTY';

        // Symbol selection
        document.querySelectorAll('.symbol-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.symbol-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentSymbol = e.target.dataset.symbol;
                document.getElementById('results').innerHTML = '';
            });
        });

        // Show/hide loading
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        // Show error
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        // Show success
        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        // Fetch prediction
        document.getElementById('predictBtn').addEventListener('click', async () => {
            showLoading(true);
            try {
                const res = await fetch(`/api/predict/${currentSymbol}`);
                const data = await res.json();
                if (res.ok) {
                    displayPrediction(data);
                    showSuccess('Prediction generated!');
                } else {
                    showError(data.error || 'Prediction failed');
                }
            } catch (e) {
                showError('Error: ' + e.message);
            }
            showLoading(false);
        });

        // Fetch trade signal
        document.getElementById('signalBtn').addEventListener('click', async () => {
            showLoading(true);
            try {
                const res = await fetch(`/api/trade_signal/${currentSymbol}`);
                const data = await res.json();
                if (res.ok) {
                    displaySignal(data);
                    showSuccess('Trade signal generated!');
                } else {
                    showError(data.error || 'Signal generation failed');
                }
            } catch (e) {
                showError('Error: ' + e.message);
            }
            showLoading(false);
        });

        // Run backtest
        document.getElementById('backtestBtn').addEventListener('click', async () => {
            showLoading(true);
            try {
                const res = await fetch(`/api/backtest/${currentSymbol}`);
                const data = await res.json();
                if (res.ok) {
                    displayBacktest(data);
                    showSuccess('Backtest completed!');
                } else {
                    showError(data.error || 'Backtest failed');
                }
            } catch (e) {
                showError('Error: ' + e.message);
            }
            showLoading(false);
        });

        function displayPrediction(data) {
            const html = `
                <div class="card">
                    <h3>🤖 ML Price Prediction</h3>
                    <div class="metric">
                        <span class="metric-label">Symbol</span>
                        <span class="metric-value">${data.symbol}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Current Price</span>
                        <span class="metric-value">₹${data.current.toFixed(2)}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Predicted High</span>
                        <span class="metric-value">₹${data.predicted_high.toFixed(2)}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Predicted Low</span>
                        <span class="metric-value">₹${data.predicted_low.toFixed(2)}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Trend</span>
                        <span class="metric-value ${data.trend === 'UP' ? 'signal-buy' : 'signal-sell'}">${data.trend}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Confidence</span>
                        <span class="metric-value">${data.confidence.toFixed(1)}%</span>
                    </div>
                </div>
            `;
            document.getElementById('results').innerHTML += html;
        }

        function displaySignal(data) {
            const signalClass = data.signal === 'BUY' ? 'signal-buy' : data.signal === 'SELL' ? 'signal-sell' : 'signal-hold';
            const html = `
                <div class="card">
                    <h3>🎯 RL Trading Signal</h3>
                    <div class="metric">
                        <span class="metric-label">Symbol</span>
                        <span class="metric-value">${data.symbol}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Signal</span>
                        <span class="metric-value ${signalClass}">${data.signal}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Confidence</span>
                        <span class="metric-value">${data.confidence.toFixed(1)}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Current Price</span>
                        <span class="metric-value">₹${data.current_price.toFixed(2)}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Sim Final Balance</span>
                        <span class="metric-value">₹${data.final_balance.toFixed(2)}</span>
                    </div>
                </div>
            `;
            document.getElementById('results').innerHTML += html;
        }

        function displayBacktest(data) {
            const returnColor = data.total_return_pct >= 0 ? 'signal-buy' : 'signal-sell';
            let tradesHtml = '<table class="trades-table"><thead><tr><th>Type</th><th>Price</th><th>Return %</th></tr></thead><tbody>';
            data.trades.forEach(trade => {
                const tradeClass = trade.type === 'BUY' ? 'trade-buy' : 'trade-sell';
                tradesHtml += `<tr class="${tradeClass}"><td>${trade.type}</td><td>₹${trade.price.toFixed(2)}</td><td>${trade.profit_pct ? trade.profit_pct.toFixed(2) : '-'}%</td></tr>`;
            });
            tradesHtml += '</tbody></table>';

            const html = `
                <div class="card">
                    <h3>📊 Backtest Results</h3>
                    <div class="metric">
                        <span class="metric-label">Initial Balance</span>
                        <span class="metric-value">₹${data.initial_balance.toFixed(2)}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Final Balance</span>
                        <span class="metric-value">₹${data.final_balance.toFixed(2)}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Total Return</span>
                        <span class="metric-value ${returnColor}">${data.total_return_pct > 0 ? '+' : ''}${data.total_return_pct.toFixed(2)}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Win Rate</span>
                        <span class="metric-value">${data.win_rate.toFixed(1)}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Trades</span>
                        <span class="metric-value">${data.total_trades}</span>
                    </div>
                    ${tradesHtml}
                </div>
            `;
            document.getElementById('results').innerHTML += html;
        }
    </script>
</body>
</html>
